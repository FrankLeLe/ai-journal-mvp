name = "ai-router-worker"
main = "index.js"
compatibility_date = "2026-03-27"
compatibility_flags = ["nodejs_compat"]

# AI Provider API Keys（通过 Dashboard 或 wrangler secret 配置）
# 不要在这里硬编码 API Key！
# 使用：wrangler secret put QWEN_API_KEY

# 速率限制配置（官方 Rate Limiting API）
[[ratelimits]]
name = "API_RATE_LIMITER"
# namespace_id 需要在 Cloudflare Dashboard 创建或自动生成
namespace_id = "1001"

  [ratelimits.simple]
  # 每分钟 100 次请求
  limit = 100
  period = 60

# 本地开发环境变量（.dev.vars 文件优先）
# [vars]
# ALLOWED_ORIGINS = "*"
