# 🚀 AI Router Worker 自动化部署工作流
# 
# 部署最佳实践：
# 1. 本地开发和测试完成
# 2. 推送到 Git 仓库
# 3. GitHub Actions 自动触发
# 4. 自动部署到 Cloudflare 云平台
#
# 流程：Git -> GitHub Actions -> Cloudflare

name: Deploy AI Router Worker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      # Step 1: 获取代码
      - name: Checkout
        uses: actions/checkout@v4
      
      # Step 2: 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Step 3: 安装 Wrangler CLI
      - name: Install Wrangler
        run: npm install -g wrangler
      
      # Step 4: 生成 TypeScript 类型定义
      - name: Generate Types
        run: wrangler types
        working-directory: ./worker
      
      # Step 5: 部署到 Cloudflare Workers
      - name: Deploy Worker
        run: wrangler deploy --name ai-router-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
