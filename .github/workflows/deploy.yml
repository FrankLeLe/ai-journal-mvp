name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Build (Static Export)
        run: |
          echo "=== 开始构建 ==="
          npm run build || true
          echo "=== 检查构建产物 ==="
          if [ -f "out/index.html" ]; then
            echo "✅ 构建成功，out/index.html 存在"
            ls -la out/
          else
            echo "❌ 构建失败，out/index.html 不存在"
            exit 1
          fi
      
      - name: Deploy to Cloudflare Pages
        run: |
          echo "=== 开始部署 ==="
          npx wrangler pages deploy out --project-name=ai-journal-mvp --branch=main
