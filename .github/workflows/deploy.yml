name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build (Static Export)
        run: |
          echo "=== 开始构建 ==="
          # 构建会输出 API 路由的警告，但实际会成功
          npm run build 2>&1 | tee build.log || true
          echo "=== 构建完成 ==="
          # 验证 out 目录存在
          if [ -f "out/index.html" ]; then
            echo "✅ 构建成功，out/index.html 存在"
            ls -la out/
          else
            echo "❌ 构建失败，out/index.html 不存在"
            exit 1
          fi
        env:
          NODE_ENV: production
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: |
            pages deploy out --project-name=ai-journal-mvp --branch=main
