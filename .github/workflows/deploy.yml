name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
        continue-on-error: true
      
      - name: Debug build output
        run: |
          echo "=== 当前目录 ==="
          pwd
          echo "=== 列出所有目录 ==="
          ls -la
          echo "=== 检查 .next 目录 ==="
          ls -la .next/ 2>/dev/null || echo ".next 不存在"
          echo "=== 检查 out 目录 ==="
          ls -la out/ 2>/dev/null || echo "out 不存在"
          echo "=== 查找 index.html ==="
          find . -name "index.html" -type f 2>/dev/null | head -10
      
      - name: Verify build output
        run: |
          echo "=== 检查构建产物 ==="
          if [ -f "out/index.html" ]; then
            echo "✅ 构建成功"
            ls -la out/
          else
            echo "❌ 构建失败，out/index.html 不存在"
            exit 1
          fi
      
      - name: Deploy to Cloudflare Pages
        run: |
          echo "=== 开始部署 ==="
          npx wrangler pages deploy out --project-name=ai-journal-mvp --branch=main
