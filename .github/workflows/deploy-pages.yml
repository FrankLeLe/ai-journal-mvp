# 🚀 AI Journal Pages 自动化部署工作流
#
# 部署最佳实践：
# 1. 本地开发和测试完成
# 2. 推送到 Git 仓库
# 3. GitHub Actions 自动触发
# 4. 自动部署到 Cloudflare 云平台
#
# 流程：Git -> GitHub Actions -> Cloudflare

name: Deploy Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Pages
    steps:
      # Step 1: 获取代码
      - name: Checkout
        uses: actions/checkout@v4
      
      # Step 2: 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Step 3: 安装项目依赖
      - name: Install Dependencies
        run: npm install
        working-directory: ./
      
      # Step 4: 构建 Next.js 项目
      - name: Build Pages
        run: npm run build
        working-directory: ./
      
      # Step 5: 部署到 Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .next --project-name=ai-journal-mvp --branch=main
        working-directory: ./
